<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEW POINT - المهام والتعاملات</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#1a1a2e,#0f3460);min-height:100vh;padding:10px;direction:rtl}
.container{max-width:1100px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,0.4)}
.header{background:linear-gradient(135deg,#0f3460,#533483);color:white;padding:20px 25px}
.header h1{font-size:20px}.header p{font-size:12px;opacity:.8;margin-top:3px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:#f0f4ff;border-bottom:2px solid #e0e8ff}
.stat{padding:12px;text-align:center;border-left:1px solid #e0e8ff}
.stat-num{font-size:24px;font-weight:700;color:#0f3460}
.stat-lbl{font-size:11px;color:#777;margin-top:2px}
.body{display:grid;grid-template-columns:340px 1fr}
.form-panel{background:#f8f9ff;padding:18px;border-left:2px solid #e0e8ff}
.form-panel h2{font-size:14px;color:#0f3460;margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1.5px solid #d0d8f0;border-radius:7px;font-size:13px;font-family:inherit;direction:rtl;background:white}
.field textarea{min-height:65px;resize:vertical}
.media-btns{display:flex;gap:8px;margin-bottom:8px}
.mbtn{flex:1;padding:9px;border:2px dashed #c0c8e8;border-radius:7px;background:white;cursor:pointer;font-size:12px;color:#555;text-align:center}
.mbtn.rec{border-color:#e53e3e;color:#e53e3e;background:#fff5f5}
.mstatus{font-size:11px;color:#e53e3e;margin-bottom:6px;min-height:15px}
.ppreview{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.ppreview img{width:55px;height:55px;object-fit:cover;border-radius:5px;cursor:pointer}
.save-btn{width:100%;padding:12px;background:linear-gradient(135deg,#0f3460,#533483);color:white;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer}
.clear-btn{width:100%;padding:8px;background:white;color:#e53e3e;border:1.5px solid #e53e3e;border-radius:7px;font-size:12px;cursor:pointer;margin-top:6px}
.list-panel{padding:18px;overflow-y:auto;max-height:700px}
.list-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.list-top h2{font-size:14px;color:#0f3460}
.ftabs{display:flex;gap:5px}
.ftab{padding:5px 12px;border:1.5px solid #d0d8f0;border-radius:15px;background:white;cursor:pointer;font-size:11px;color:#666}
.ftab.active{background:#0f3460;color:white;border-color:#0f3460}
.card{background:white;border-radius:9px;padding:13px;margin-bottom:9px;border:1.5px solid #e8eeff;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.card.task{border-right:4px solid #ed8936}
.card.transaction{border-right:4px solid #48bb78}
.card.note{border-right:4px solid #667eea}
.ctop{display:flex;justify-content:space-between;align-items:flex-start}
.ctitle{font-weight:700;font-size:13px;color:#222}
.cmeta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:3px}
.badge{padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600}
.bt{background:#fff3e0;color:#e65c00}
.btr{background:#e8f8f0;color:#2d7a4f}
.bn{background:#f0f4ff;color:#3d5afe}
.cdate{font-size:11px;color:#aaa}
.cdesc{font-size:12px;color:#555;margin-top:6px;line-height:1.4}
.cmedia{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}
.cmedia img{width:65px;height:65px;object-fit:cover;border-radius:5px;cursor:pointer}
audio{width:100%;margin-top:6px}
.delbtn{background:none;border:none;color:#ddd;cursor:pointer;font-size:15px;padding:2px 5px}
.delbtn:hover{color:#e53e3e}
.empty{text-align:center;padding:50px 20px;color:#bbb}
@media(max-width:768px){.body{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.form-panel{border-left:none;border-bottom:2px solid #e0e8ff}}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>📋 نظام المهام والتعاملات اليومية</h1>
  <p>NEW POINT Engineering Consultancy &amp; General Contracting</p>
</div>
<div class="stats">
  <div class="stat"><div class="stat-num" id="s1">0</div><div class="stat-lbl">إجمالي</div></div>
  <div class="stat"><div class="stat-num" id="s2">0</div><div class="stat-lbl">مهام</div></div>
  <div class="stat"><div class="stat-num" id="s3">0</div><div class="stat-lbl">تعاملات</div></div>
  <div class="stat"><div class="stat-num" id="s4">0</div><div class="stat-lbl">صور وصوت</div></div>
</div>
<div class="body">
<div class="form-panel">
  <h2>➕ تسجيل جديد</h2>
  <div class="field"><label>النوع</label>
    <select id="ftype" onchange="toggleAmt()">
      <option value="">-- اختر --</option>
      <option value="task">📝 مهمة</option>
      <option value="transaction">💰 معاملة مالية</option>
      <option value="note">📌 ملاحظة</option>
    </select>
  </div>
  <div class="field"><label>العنوان</label><input type="text" id="ftitle" placeholder="مثال: صب خرسانة - حي 23"></div>
  <div class="field"><label>التاريخ</label><input type="date" id="fdate"></div>
  <div class="field" id="famtf" style="display:none"><label>المبلغ (جنيه)</label><input type="number" id="famt" placeholder="0"></div>
  <div class="field"><label>التفاصيل</label><textarea id="fdesc" placeholder="اكتب التفاصيل..."></textarea></div>
  <div class="media-btns">
    <button class="mbtn" id="abtn" onclick="toggleAudio()">🎤 تسجيل صوتي</button>
    <label class="mbtn">📷 صور<input type="file" id="fphotos" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)"></label>
  </div>
  <div class="mstatus" id="astatus"></div>
  <div class="ppreview" id="ppreview"></div>
  <button class="save-btn" onclick="saveRec()">💾 حفظ التسجيل</button>
  <button class="clear-btn" onclick="clearF()">مسح</button>
</div>
<div class="list-panel">
  <div class="list-top">
    <h2>📋 التسجيلات</h2>
    <div class="ftabs">
      <button class="ftab active" onclick="setF('all',this)">الكل</button>
      <button class="ftab" onclick="setF('task',this)">مهام</button>
      <button class="ftab" onclick="setF('transaction',this)">تعاملات</button>
      <button class="ftab" onclick="setF('note',this)">ملاحظات</button>
    </div>
  </div>
  <div id="rlist"></div>
</div>
</div>
</div>
<script>
let recs=JSON.parse(localStorage.getItem('np2')||'[]'),filter='all',mr=null,ac=[],curAudio=null,photos=[];
document.getElementById('fdate').valueAsDate=new Date();
function toggleAmt(){document.getElementById('famtf').style.display=document.getElementById('ftype').value==='transaction'?'block':'none'}
async function toggleAudio(){
  const b=document.getElementById('abtn'),s=document.getElementById('astatus');
  if(mr&&mr.state==='recording'){mr.stop();b.textContent='🎤 تسجيل صوتي';b.className='mbtn';s.textContent=''}
  else{try{const st=await navigator.mediaDevices.getUserMedia({audio:true});mr=new MediaRecorder(st);ac=[];
    mr.ondataavailable=e=>ac.push(e.data);
    mr.onstop=()=>{curAudio=new Blob(ac,{type:'audio/webm'});s.textContent='✅ تم التسجيل';st.getTracks().forEach(t=>t.stop())};
    mr.start();b.textContent='⏹️ إيقاف';b.className='mbtn rec';s.textContent='🔴 جاري التسجيل...'}
  catch(e){s.textContent='❌ تعذر الوصول للميكروفون'}}}
function handlePhotos(i){photos=[];document.getElementById('ppreview').innerHTML='';
  Array.from(i.files).forEach(f=>{const r=new FileReader();r.onload=e=>{photos.push(e.target.result);const img=document.createElement('img');img.src=e.target.result;img.onclick=()=>{photos=photos.filter(p=>p!==e.target.result);img.remove()};document.getElementById('ppreview').appendChild(img)};r.readAsDataURL(f)})}
async function saveRec(){
  const t=document.getElementById('ftype').value,ti=document.getElementById('ftitle').value.trim();
  if(!t||!ti){alert('اختر النوع واكتب العنوان');return}
  let aud=null;if(curAudio){const r=new FileReader();aud=await new Promise(res=>{r.onload=e=>res(e.target.result);r.readAsDataURL(curAudio)})}
  recs.unshift({id:Date.now(),type:t,title:ti,date:document.getElementById('fdate').value,amt:document.getElementById('famt').value||null,desc:document.getElementById('fdesc').value,audio:aud,photos:[...photos]});
  localStorage.setItem('np2',JSON.stringify(recs));render();clearF()}
function clearF(){['ftype','ftitle','fdesc','famt'].forEach(id=>document.getElementById(id).value='');document.getElementById('fphotos').value='';document.getElementById('ppreview').innerHTML='';document.getElementById('astatus').textContent='';document.getElementById('abtn').textContent='🎤 تسجيل صوتي';document.getElementById('abtn').className='mbtn';document.getElementById('famtf').style.display='none';photos=[];curAudio=null;if(mr&&mr.state==='recording')mr.stop()}
function setF(f,b){filter=f;document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}
function delRec(id){if(confirm('حذف؟')){recs=recs.filter(r=>r.id!==id);localStorage.setItem('np2',JSON.stringify(recs));render()}}
function render(){
  const list=document.getElementById('rlist'),filtered=filter==='all'?recs:recs.filter(r=>r.type===filter);
  if(!filtered.length){list.innerHTML='<div class="empty">📭<p>لا توجد تسجيلات</p></div>';updateS();return}
  list.innerHTML=filtered.map(r=>`<div class="card ${r.type}">
    <div class="ctop"><div><div class="ctitle">${r.title}</div>
    <div class="cmeta"><span class="badge ${r.type==='task'?'bt':r.type==='transaction'?'btr':'bn'}">${r.type==='task'?'📝 مهمة':r.type==='transaction'?'💰 معاملة':'📌 ملاحظة'}</span>
    ${r.amt?`<span class="badge btr">${Number(r.amt).toLocaleString()} ج</span>`:''}
    <span class="cdate">${r.date}</span></div></div>
    <button class="delbtn" onclick="delRec(${r.id})">✕</button></div>
    ${r.desc?`<div class="cdesc">${r.desc}</div>`:''}
    ${r.audio?`<audio controls src="${r.audio}"></audio>`:''}
    ${r.photos&&r.photos.length?`<div class="cmedia">${r.photos.map(p=>`<img src="${p}" onclick="window.open('${p}','_blank')">`).join('')}</div>`:''}
  </div>`).join('');updateS()}
function updateS(){document.getElementById('s1').textContent=recs.length;document.getElementById('s2').textContent=recs.filter(r=>r.type==='task').length;document.getElementById('s3').textContent=recs.filter(r=>r.type==='transaction').length;document.getElementById('s4').textContent=recs.reduce((n,r)=>n+(r.audio?1:0)+(r.photos?r.photos.length:0),0)}
render();
</script>
</body>
</html>
